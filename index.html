<!DOCTYPE html>
<html lang="en">
<head>

<meta name="description" content="Portfolio of Mohamed Irfan Shafi S M — AI/ML Student at Kongu Engineering College. Turning Data Into Decisions.">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='18' fill='%2334d399'/%3E%3Ctext x='50' y='72' font-family='sans-serif' font-size='52' font-weight='bold' fill='%23050510' text-anchor='middle'%3EM%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,400&display=swap" rel="stylesheet">

<script>tailwind.config={theme:{extend:{fontFamily:{h:['Space Grotesk','sans-serif'],b:['DM Sans','sans-serif']}}}}</script>
<style>
:root{--bg:#050510;--bg2:#0a0a18;--bg3:#101024;--bg4:#161636;--tx:#e4e2dc;--tx2:#7e7e98;--tx3:#4a4a66;--ac:#34d399;--ac2:#6ee7b7;--ac3:#059669;--acd:rgba(52,211,153,0.08);--acg:rgba(52,211,153,0.18);--bd:#1a1a35;--bd2:#252550;--nav:rgba(5,5,16,0.88);--mod:rgba(3,3,8,0.94);--sh:0 8px 40px rgba(0,0,0,0.5);--r:14px;--rs:8px;--rl:22px;--glow:0 0 50px rgba(52,211,153,0.12)}
.lm{--bg:#f2f0ea;--bg2:#e8e6de;--bg3:#ffffff;--bg4:#f0ede4;--tx:#141428;--tx2:#666680;--tx3:#9999b0;--ac:#059669;--ac2:#10b981;--ac3:#047857;--acd:rgba(5,150,105,0.06);--acg:rgba(5,150,105,0.14);--bd:#d4d0c6;--bd2:#c4c0b6;--nav:rgba(242,240,234,0.9);--mod:rgba(200,198,192,0.92);--sh:0 8px 30px rgba(0,0,0,0.06);--glow:0 0 30px rgba(5,150,105,0.08)}
*{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;scrollbar-width:thin;scrollbar-color:var(--ac) var(--bg2)}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg2)}::-webkit-scrollbar-thumb{background:var(--ac);border-radius:3px}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx);line-height:1.7;overflow-x:hidden;transition:background .5s,color .5s}
h1,h2,h3,h4{font-family:'Space Grotesk',sans-serif;line-height:1.15}
a{color:var(--ac);text-decoration:none;transition:color .2s}a:hover{color:var(--ac2)}
::selection{background:var(--ac);color:#fff}

.mnav{position:fixed;top:0;left:0;right:0;z-index:100;height:60px;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;transition:all .4s}
.mnav.sc{background:var(--nav);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);box-shadow:0 1px 20px rgba(0,0,0,0.3);border-bottom:1px solid var(--bd)}
.nlogo{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.15rem;color:var(--tx);letter-spacing:-.5px}.nlogo span{color:var(--ac)}
.nlinks{display:flex;gap:1.4rem;align-items:center}
.nlinks a{color:var(--tx2);font-size:.85rem;font-weight:500;position:relative;transition:color .2s;padding:.2rem 0}
.nlinks a:hover,.nlinks a.act{color:var(--ac)}
.nlinks a::after{content:'';position:absolute;bottom:-2px;left:0;width:0;height:2px;background:var(--ac);transition:width .3s;border-radius:1px}
.nlinks a:hover::after,.nlinks a.act::after{width:100%}
.nacts{display:flex;gap:.6rem;align-items:center}
.tbtn{background:none;border:1px solid var(--bd);color:var(--tx2);width:34px;height:34px;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .25s;font-size:.85rem}
.tbtn:hover{border-color:var(--ac);color:var(--ac);box-shadow:var(--glow)}
.mtog{display:none;background:none;border:none;color:var(--tx);font-size:1.3rem;cursor:pointer}
.mmenu{display:none;position:fixed;top:60px;left:0;right:0;background:var(--nav);backdrop-filter:blur(20px);padding:1.2rem 2rem;flex-direction:column;gap:.8rem;border-bottom:1px solid var(--bd);z-index:99}
.mmenu.open{display:flex}
.mmenu a{color:var(--tx2);font-weight:500;padding:.4rem 0;font-size:.95rem}

.sec{padding:6rem 2rem;max-width:1160px;margin:0 auto}
.slbl{font-size:.75rem;font-weight:600;letter-spacing:3.5px;text-transform:uppercase;color:var(--ac);margin-bottom:.4rem}
.sttl{font-size:clamp(1.8rem,4vw,2.8rem);font-weight:700;margin-bottom:.8rem;background:linear-gradient(135deg,var(--tx),var(--tx2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.sdesc{color:var(--tx2);max-width:560px;font-size:1rem;margin-bottom:2.5rem}
.sec-div{width:60px;height:3px;background:linear-gradient(90deg,var(--ac),transparent);border-radius:2px;margin-bottom:2rem}

.hero{min-height:100vh;display:flex;align-items:center;position:relative;overflow:hidden;padding:5rem 2rem 3rem}
.hero canvas{position:absolute;inset:0;z-index:0}
.hero-floats{position:absolute;inset:0;z-index:0;pointer-events:none;overflow:hidden}
.hero-floats svg{position:absolute;opacity:.06}
.hero-inner{position:relative;z-index:1;max-width:1160px;margin:0 auto;width:100%;display:grid;grid-template-columns:1.1fr .9fr;gap:3rem;align-items:center}
.hero-typing{color:var(--ac);font-weight:400;font-size:clamp(.95rem,2vw,1.15rem);margin-bottom:.6rem;min-height:1.8em;letter-spacing:.5px}
.hero h1{font-size:clamp(2.4rem,5.5vw,3.8rem);font-weight:700;letter-spacing:-1.5px;margin-bottom:1rem;line-height:1.08}
.hero h1 .gr{background:linear-gradient(135deg,var(--ac),var(--ac2),#a7f3d0);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-sub{color:var(--tx2);font-size:1.02rem;margin-bottom:2rem;max-width:500px;line-height:1.85}
.hbtns{display:flex;gap:1rem;flex-wrap:wrap}
.btn1{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.7rem;background:var(--ac);color:#050510;font-weight:700;font-size:.88rem;border:none;border-radius:var(--rs);cursor:pointer;transition:all .3s;font-family:'Space Grotesk',sans-serif;position:relative;overflow:hidden}
.btn1::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(255,255,255,0.2),transparent);transform:translateX(-100%);transition:transform .5s}
.btn1:hover::before{transform:translateX(100%)}
.btn1:hover{transform:translateY(-3px);box-shadow:0 8px 30px rgba(52,211,153,0.35)}
.btn2{display:inline-flex;align-items:center;gap:.5rem;padding:.75rem 1.7rem;background:transparent;color:var(--tx);font-weight:600;font-size:.88rem;border:1px solid var(--bd2);border-radius:var(--rs);cursor:pointer;transition:all .3s;font-family:'Space Grotesk',sans-serif}
.btn2:hover{border-color:var(--ac);color:var(--ac);transform:translateY(-3px);box-shadow:var(--glow)}
.hero-visual{display:flex;justify-content:center;align-items:center;position:relative}
.hero-avatar{width:300px;height:300px;position:relative}
.hero-avatar .ring{position:absolute;inset:0;border-radius:50%;border:2px solid var(--bd2);animation:spinS 20s linear infinite}
.hero-avatar .ring:nth-child(2){inset:15px;border-color:var(--bd);animation-duration:15s;animation-direction:reverse}
.hero-avatar .ring:nth-child(3){inset:30px;border-color:var(--ac);border-style:dashed;opacity:.35;animation-duration:25s}
.hero-avatar .core{position:absolute;inset:50px;border-radius:50%;background:linear-gradient(145deg,var(--bg3),var(--bg4));border:2px solid var(--bd2);display:flex;align-items:center;justify-content:center;overflow:hidden}
.hero-avatar .core svg{width:55%;height:55%;opacity:.55}
.hero-avatar .dot{position:absolute;width:10px;height:10px;background:var(--ac);border-radius:50%;box-shadow:0 0 12px var(--ac)}
.hero-avatar .dot:nth-child(5){top:-5px;left:50%;animation:pul 2s ease-in-out infinite}
.hero-avatar .dot:nth-child(6){bottom:-5px;left:50%;animation:pul 2s ease-in-out infinite .5s}
.hero-avatar .dot:nth-child(7){left:-5px;top:50%;animation:pul 2s ease-in-out infinite 1s}
.hero-avatar .dot:nth-child(8){right:-5px;top:50%;animation:pul 2s ease-in-out infinite 1.5s}
@keyframes spinS{to{transform:rotate(360deg)}}
@keyframes pul{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.8);opacity:.3}}
.scroll-ind{position:absolute;bottom:2rem;left:50%;transform:translateX(-50%);z-index:1;color:var(--tx3);font-size:.75rem;display:flex;flex-direction:column;align-items:center;gap:.4rem;animation:bob 2.5s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-8px)}}

.abt-grid{display:grid;grid-template-columns:auto 1fr;gap:3rem;align-items:start}
.abt-vis{width:190px;height:250px;position:relative;flex-shrink:0}
.abt-vis .shape{position:absolute;border-radius:var(--rl);border:2px solid var(--bd2);animation:fl 6s ease-in-out infinite}
.abt-vis .shape:nth-child(1){inset:0;background:linear-gradient(145deg,var(--bg3),var(--bg4))}
.abt-vis .shape:nth-child(2){inset:14px;border-color:var(--ac);opacity:.25;animation-delay:-2s}
.abt-vis .shape:nth-child(3){inset:28px;background:var(--acd);animation-delay:-4s}
.abt-vis .icon{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:var(--ac);font-size:2.8rem;opacity:.45}
@keyframes fl{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-12px) rotate(2deg)}}
.abt-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin-top:2rem}
.stat-c{text-align:center;padding:1.1rem .5rem;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rs);transition:all .3s}
.stat-c:hover{border-color:var(--ac);box-shadow:var(--glow);transform:translateY(-2px)}
.stat-n{font-family:'Space Grotesk',sans-serif;font-size:1.6rem;font-weight:700;color:var(--ac)}
.stat-l{font-size:.75rem;color:var(--tx2);margin-top:.15rem}

/* ===== ENHANCED SKILLS ===== */
.sk-cats{display:flex;gap:.6rem;margin-bottom:1.8rem;flex-wrap:wrap}
.sk-cat-btn{padding:.4rem 1rem;border:1px solid var(--bd);border-radius:50px;background:transparent;color:var(--tx2);font-size:.8rem;cursor:pointer;transition:all .25s;font-family:'DM Sans',sans-serif}
.sk-cat-btn.on,.sk-cat-btn:hover{background:var(--ac);color:#050510;border-color:var(--ac);font-weight:600}
.sk-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:1.2rem}
.sk-card{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:1.5rem;transition:all .4s;position:relative;overflow:hidden}
.sk-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;background:linear-gradient(90deg,var(--ac),var(--ac2));transform:scaleX(0);transform-origin:left;transition:transform .4s}
.sk-card:hover{border-color:var(--ac);transform:translateY(-5px);box-shadow:var(--glow)}
.sk-card:hover::before{transform:scaleX(1)}
.sk-card-top{display:flex;align-items:center;gap:1rem;margin-bottom:1rem}
.sk-card-icon{width:50px;height:50px;border-radius:12px;background:var(--acd);border:1px solid rgba(52,211,153,0.12);display:flex;align-items:center;justify-content:center;color:var(--ac);font-size:1.3rem;flex-shrink:0;transition:all .3s}
.sk-card:hover .sk-card-icon{background:var(--ac);color:#050510;border-color:var(--ac);transform:scale(1.05)}
.sk-card-name{font-family:'Space Grotesk',sans-serif;font-weight:700;font-size:1.05rem}
.sk-card-cat{font-size:.7rem;color:var(--tx3);text-transform:uppercase;letter-spacing:1px;margin-top:.15rem}
.sk-card-level{display:inline-block;padding:.15rem .6rem;border-radius:50px;font-size:.68rem;font-weight:600;letter-spacing:.5px;text-transform:uppercase;margin-bottom:.8rem}
.sk-card-level.intermediate{background:rgba(52,211,153,0.12);color:var(--ac);border:1px solid rgba(52,211,153,0.2)}
.sk-card-level.learning{background:rgba(251,191,36,0.1);color:#fbbf24;border:1px solid rgba(251,191,36,0.2)}
.sk-card-level.familiar{background:rgba(96,165,250,0.1);color:#60a5fa;border:1px solid rgba(96,165,250,0.2)}
.sk-card-level.advanced{background:rgba(167,139,250,0.1);color:#a78bfa;border:1px solid rgba(167,139,250,0.2)}
.sk-card-details{color:var(--tx3);font-size:.85rem;line-height:1.7}
.sk-card-details span{color:var(--tx2);font-weight:500}

/* ===== EDUCATION ===== */
.tl{position:relative;padding-left:2.5rem}
.tl::before{content:'';position:absolute;left:7px;top:8px;bottom:8px;width:2px;background:linear-gradient(to bottom,var(--ac),var(--bd),transparent);border-radius:1px}
.tl-item{position:relative;margin-bottom:2rem}.tl-item:last-child{margin-bottom:0}
.tl-dot{position:absolute;left:-2.5rem;top:6px;width:16px;height:16px;border-radius:50%;background:var(--bg);border:3px solid var(--ac);z-index:1;box-shadow:0 0 12px rgba(52,211,153,0.3)}
.tl-card{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:1.4rem;transition:all .35s;position:relative;overflow:hidden}
.tl-card::after{content:'';position:absolute;top:0;left:0;width:3px;height:100%;background:var(--ac);opacity:0;transition:opacity .3s}
.tl-card:hover{border-color:var(--bd2);transform:translateX(6px);box-shadow:var(--sh)}
.tl-card:hover::after{opacity:1}
.tl-dur{font-size:.78rem;color:var(--ac);font-weight:600;letter-spacing:1.5px;text-transform:uppercase}
.tl-role{font-size:1.1rem;font-weight:700;margin:.2rem 0}
.tl-co{color:var(--tx2);font-size:.9rem;margin-bottom:.4rem}
.tl-desc{color:var(--tx3);font-size:.88rem;line-height:1.75}
.tl-badge{display:inline-block;padding:.15rem .55rem;border-radius:50px;font-size:.68rem;font-weight:600;background:var(--acd);color:var(--ac);border:1px solid rgba(52,211,153,0.15);margin-top:.5rem}

/* ===== PROJECTS ===== */
.pj-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:1.5rem}
.pj-card{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);overflow:hidden;transition:all .4s;position:relative}
.pj-card:hover{border-color:var(--ac);transform:translateY(-6px);box-shadow:var(--sh)}
.pj-vis{height:150px;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden}
.pj-vis i{font-size:2.5rem;color:var(--ac);opacity:.5;position:relative;z-index:1}
.pj-status{position:absolute;top:.8rem;right:.8rem;padding:.2rem .7rem;border-radius:50px;font-size:.7rem;font-weight:600;letter-spacing:.5px;text-transform:uppercase;z-index:2}
.pj-status.live{background:rgba(52,211,153,0.2);color:var(--ac);border:1px solid rgba(52,211,153,0.3)}
.pj-status.dev{background:rgba(251,191,36,0.15);color:#fbbf24;border:1px solid rgba(251,191,36,0.25)}
.pj-body{padding:1.3rem}
.pj-t{font-size:1.05rem;font-weight:700;margin-bottom:.4rem}
.pj-d{color:var(--tx2);font-size:.88rem;margin-bottom:.8rem;line-height:1.65}
.pj-tags{display:flex;flex-wrap:wrap;gap:.35rem;margin-bottom:1rem}
.pj-tags span{font-size:.72rem;padding:.18rem .6rem;background:var(--acd);color:var(--ac);border-radius:50px;font-weight:500;border:1px solid rgba(52,211,153,0.15)}
.pj-links{display:flex;gap:1rem}
.pj-links a{font-size:.82rem;display:flex;align-items:center;gap:.3rem;color:var(--tx3);transition:color .2s}
.pj-links a:hover{color:var(--ac)}

/* ===== CERTS ===== */
.ct-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:1.2rem}
.ct-card{background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:1.3rem;display:flex;gap:1rem;align-items:flex-start;transition:all .3s;position:relative;overflow:hidden}
.ct-card::before{content:'';position:absolute;top:0;right:0;width:60px;height:60px;background:var(--acd);border-radius:0 0 0 60px}
.ct-card:hover{border-color:var(--ac);transform:translateY(-3px);box-shadow:var(--glow)}
.ct-icon{width:46px;height:46px;border-radius:var(--rs);background:var(--acd);display:flex;align-items:center;justify-content:center;color:var(--ac);font-size:1.1rem;flex-shrink:0;position:relative;z-index:1}
.ct-n{font-weight:700;font-size:.92rem;position:relative;z-index:1}
.ct-is{color:var(--tx2);font-size:.82rem}
.ct-dt{color:var(--tx3);font-size:.78rem;margin-top:.15rem}
.ct-lk{display:inline-block;margin-top:.4rem;font-size:.78rem;color:var(--ac);position:relative;z-index:1}
.coming-soon{text-align:center;padding:4rem 2rem}
.coming-soon i{font-size:3rem;color:var(--ac);opacity:.3;margin-bottom:1rem;display:block}
.coming-soon h3{font-size:1.3rem;font-weight:700;margin-bottom:.5rem}
.coming-soon p{color:var(--tx3);font-size:.92rem}

/* ===== CONTACT ===== */
.ct-form-grid{display:grid;grid-template-columns:1fr 1fr;gap:3rem;align-items:start}
.ct-info{display:flex;flex-direction:column;gap:1.2rem}
.ct-item{display:flex;align-items:center;gap:.9rem}
.ct-ic{width:42px;height:42px;border-radius:var(--rs);background:var(--acd);display:flex;align-items:center;justify-content:center;color:var(--ac);font-size:.95rem;flex-shrink:0}
.ct-it{font-size:.92rem}.ct-il{font-size:.72rem;color:var(--tx3);text-transform:uppercase;letter-spacing:1px}
.soc-links{display:flex;gap:.6rem;margin-top:.8rem}
.soc-l{width:38px;height:38px;border-radius:50%;border:1px solid var(--bd);display:flex;align-items:center;justify-content:center;color:var(--tx2);transition:all .25s;font-size:.9rem}
.soc-l:hover{border-color:var(--ac);color:var(--ac);background:var(--acd);transform:translateY(-2px)}
.cform{display:flex;flex-direction:column;gap:.9rem}
.fg{display:flex;flex-direction:column;gap:.3rem}
.fg label{font-size:.75rem;font-weight:600;color:var(--tx2);text-transform:uppercase;letter-spacing:1px}
.fi{padding:.7rem 1rem;background:var(--bg3);border:1px solid var(--bd);border-radius:var(--rs);color:var(--tx);font-family:'DM Sans',sans-serif;font-size:.92rem;transition:all .25s;outline:none}
.fi:focus{border-color:var(--ac);box-shadow:0 0 0 3px var(--acd)}
textarea.fi{min-height:110px;resize:vertical}

/* ===== FOOTER ===== */
.sf{border-top:1px solid var(--bd);padding:3rem 2rem;background:var(--bg2)}
.sf-inner{max-width:1160px;margin:0 auto;display:grid;grid-template-columns:2fr 1fr 1fr;gap:2rem}
.sf-br{font-family:'Space Grotesk',sans-serif;font-size:1.05rem;font-weight:700;margin-bottom:.4rem}.sf-br span{color:var(--ac)}
.sf-dc{color:var(--tx3);font-size:.82rem;max-width:280px}
.sf-hd{font-size:.75rem;font-weight:600;text-transform:uppercase;letter-spacing:2px;color:var(--tx2);margin-bottom:.8rem}
.sf-lk{display:flex;flex-direction:column;gap:.4rem}
.sf-lk a{color:var(--tx3);font-size:.88rem}.sf-lk a:hover{color:var(--ac)}
.sf-bt{max-width:1160px;margin:1.8rem auto 0;padding-top:1.2rem;border-top:1px solid var(--bd);display:flex;justify-content:space-between;align-items:center;font-size:.78rem;color:var(--tx3)}

.rv{opacity:0;transform:translateY(35px);transition:opacity .7s ease,transform .7s ease}
.rv.in{opacity:1;transform:translateY(0)}
.rv-d1{transition-delay:.1s}.rv-d2{transition-delay:.2s}.rv-d3{transition-delay:.3s}.rv-d4{transition-delay:.4s}.rv-d5{transition-delay:.5s}

/* ===== ADMIN ===== */
.adm-ov{position:fixed;inset:0;z-index:200;background:var(--bg);display:none;flex-direction:column}
.adm-ov.open{display:flex}

const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,7);
const esc=s=>{if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML};
async function hp(p,s){
  const input=s+p;
  // Works on hosted HTTPS and also when the file is opened directly with file://
  if(window.crypto && crypto.subtle && window.TextEncoder){
    const d=new TextEncoder().encode(input);
    const b=await crypto.subtle.digest('SHA-256',d);
    return Array.from(new Uint8Array(b)).map(x=>x.toString(16).padStart(2,'0')).join('');
  }
  // Fallback for local file opening where crypto.subtle may be unavailable
  let h=2166136261;
  for(let i=0;i<input.length;i++){h^=input.charCodeAt(i);h=Math.imul(h,16777619)}
  return 'fallback_'+(h>>>0).toString(16);
}

function D(){return window._d}
function gI(sec,id){const a=D()[sec];return a?a.find(i=>i.id===id):null}
function aI(sec,item){const d=D();if(!d[sec])d[sec]=[];item.id=item.id||uid();d[sec].push(item);saveD(d);return item}
function uI(sec,id,u){const d=D();const a=d[sec];if(!a)return;const i=a.findIndex(x=>x.id===id);if(i>-1){Object.assign(a[i],u);saveD(d)}}
function dI(sec,id){const d=D();d[sec]=(d[sec]||[]).filter(x=>x.id!==id);saveD(d)}
function mI(sec,f,t){const d=D();const a=d[sec];if(!a)return;const[item]=a.splice(f,1);a.splice(t,0,item);saveD(d)}

      </div>
    </div>`;
  const words=p.tagline.split('|').map(w=>w.trim()).filter(Boolean);
  if(!words.length)return;let wi=0,ci=0,del=false;const el=document.getElementById('typeTarget');
  function tick(){if(!el)return;const w=words[wi];if(!del){el.textContent=w.slice(0,++ci);if(ci===w.length){del=true;setTimeout(tick,2200);return}}else{el.textContent=w.slice(0,--ci);if(ci===0){del=false;wi=(wi+1)%words.length}}setTimeout(tick,del?30:55)}
  setTimeout(tick,600);
}

function mField(f,v){
  const val=v||'',req=f.req?'required':'',ph=f.ph?`placeholder="${esc(f.ph)}"`:'';
  const full=f.t==='textarea'?'fw':'';
  switch(f.t){
    case'text':return`<div class="afgg ${full}"><label>${esc(f.l)}</label><input class="afi" name="${f.k}" value="${esc(val)}" ${ph} ${req}></div>`;
    case'textarea':return`<div class="afgg fw"><label>${esc(f.l)}</label><textarea class="afi" name="${f.k}" ${req}>${esc(val)}</textarea></div>`;
    case'select':return`<div class="afgg"><label>${esc(f.l)}</label><select class="afi" name="${f.k}">${f.opts.map(o=>`<option value="${esc(o)}" ${val===o?'selected':''}>${esc(o)}</option>`).join('')}</select></div>`;
    default:return`<div class="afgg ${full}"><label>${esc(f.l)}</label><input class="afi" name="${f.k}" value="${esc(val)}" ${ph} ${req}></div>`;
  }
}

  if(mId){uI(mSec,mId,u);toast(`${sc.s} updated`)}else{aI(mSec,u);toast(`${sc.s} added`)}
  clMod();rAdmC();
}

        <label class="ab" style="cursor:pointer"><i class="fas fa-upload"></i> Import JSON<input type="file" accept=".json" style="display:none" onchange="impD(this)"></label>
      </div>
    </div>
    <div style="background:var(--bg3);border:1px solid var(--bd);border-radius:var(--r);padding:1.3rem">
      <div style="font-weight:700;margin-bottom:.5rem"><i class="fas fa-rotate-left" style="color:#ef4444;margin-right:.4rem"></i>Reset Everything</div>
      <p style="color:var(--tx2);font-size:.85rem;margin-bottom:1rem">Erase all data and restore defaults. Cannot be undone.</p>
      <button class="ab dng" onclick="rstD()"><i class="fas fa-trash"></i> Reset All Data</button>
    </div>`;
}

async function chPwd(){
  const c=document.getElementById('s_cur').value,n=document.getElementById('s_new').value,co=document.getElementById('s_con').value;
  if(!c||!n||!co){toast('Fill all fields','err');return}
  if(n.length<6){toast('Password must be 6+ characters','err');return}
  if(n!==co){toast('Passwords don\'t match','err');return}
  const a=JSON.parse(localStorage.getItem('pa'));
  if(await hp(c,a.s)!==a.h){toast('Current password is wrong','err');return}
  const ns=crypto.randomUUID?crypto.randomUUID():uid()+uid();
  a.s=ns;a.h=await hp(n,ns);a.def=false;
  localStorage.setItem('pa',JSON.stringify(a));toast('Password changed');rAdmC();
}

function expD(){const b=new Blob([JSON.stringify(D(),null,2)],{type:'application/json'});const u=URL.createObjectURL(b),a=document.createElement('a');a.href=u;a.download=`portfolio_${new Date().toISOString().slice(0,10)}.json`;a.click();URL.revokeObjectURL(u);toast('Exported','info')}
function impD(inp){const f=inp.files[0];if(!f)return;const r=new FileReader();r.onload=e=>{try{const d=JSON.parse(e.target.result);if(!d.profile||!d.profile.name)throw 0;saveD(d);rAdmC();toast('Imported')}catch(x){toast('Invalid JSON file','err')}};r.readAsText(f);inp.value=''}
function rstD(){const ov=document.createElement('div');ov.className='mod-ov open';ov.innerHTML=`<div class="mod-c" style="max-width:400px"><div class="mod-h"><h3>Reset All Data</h3><button class="mod-x" onclick="this.closest('.mod-ov').remove()">&times;</button></div><div class="mod-b"><p style="color:var(--tx2)">This permanently erases all customizations. <strong style="color:#ef4444">Cannot be undone.</strong></p></div><div class="mod-f"><button class="ab" onclick="this.closest('.mod-ov').remove()">Cancel</button><button class="ab dng" style="border-color:#ef4444;color:#ef4444" onclick="saveD(JSON.parse(JSON.stringify(DEF)));rAdmC();toast('Reset complete','warn');this.closest('.mod-ov').remove()"><i class="fas fa-trash"></i> Reset</button></div></div>`;document.body.appendChild(ov)}

/* ===== PARTICLES ===== */
function initPart(){
  const c=document.getElementById('hcan'),ctx=c.getContext('2d');
  let W,H,pts=[],mouse={x:-999,y:-999};const N=80,MD=140;
  function resize(){W=c.width=c.offsetWidth;H=c.height=c.offsetHeight}resize();window.addEventListener('resize',resize);
  c.addEventListener('mousemove',e=>{const r=c.getBoundingClientRect();mouse.x=e.clientX-r.left;mouse.y=e.clientY-r.top});
  c.addEventListener('mouseleave',()=>{mouse.x=-999;mouse.y=-999});
  for(let i=0;i<N;i++)pts.push({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.35,vy:(Math.random()-.5)*.35,r:Math.random()*1.6+.5,a:Math.random()*.4+.15});
  function draw(){
    ctx.clearRect(0,0,W,H);const dk=!document.body.classList.contains('lm');const rgb=dk?'52,211,153':'5,150,105';
    for(const p of pts){const dx=p.x-mouse.x,dy=p.y-mouse.y,dist=Math.sqrt(dx*dx+dy*dy);if(dist<120&&dist>0){const f=(120-dist)/120*.8;p.vx+=dx/dist*f*.1;p.vy+=dy/dist*f*.1}p.vx*=.99;p.vy*=.99;p.x+=p.vx;p.y+=p.vy;if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;p.x=Math.max(0,Math.min(W,p.x));p.y=Math.max(0,Math.min(H,p.y))}
    for(let i=0;i<pts.length;i++)for(let j=i+1;j<pts.length;j++){const dx=pts[i].x-pts[j].x,dy=pts[i].y-pts[j].y,d=Math.sqrt(dx*dx+dy*dy);if(d<MD){ctx.beginPath();ctx.moveTo(pts[i].x,pts[i].y);ctx.lineTo(pts[j].x,pts[j].y);ctx.strokeStyle=`rgba(${rgb},${.06*(1-d/MD)})`;ctx.lineWidth=.7;ctx.stroke()}}
    for(const p of pts){ctx.beginPath();ctx.arc(p.x,p.y,Math.max(.1,p.r),0,Math.PI*2);ctx.fillStyle=`rgba(${rgb},${p.a})`;ctx.fill()}
    requestAnimationFrame(draw);
  }draw();
}

function initFloats(){
  const c=document.getElementById('hfloats');
  const shapes=[
    `<svg width="60" height="60" viewBox="0 0 60 60"><polygon points="30,5 55,50 5,50" fill="none" stroke="currentColor" stroke-width="1"/></svg>`,
    `<svg width="50" height="50" viewBox="0 0 50 50"><circle cx="25" cy="25" r="20" fill="none" stroke="currentColor" stroke-width="1"/></svg>`,
    `<svg width="55" height="55" viewBox="0 0 55 55"><rect x="8" y="8" width="39" height="39" rx="4" fill="none" stroke="currentColor" stroke-width="1" transform="rotate(15 27.5 27.5)"/></svg>`,
    `<svg width="45" height="45" viewBox="0 0 45 45"><polygon points="22.5,2 43,17 36,40 9,40 2,17" fill="none" stroke="currentColor" stroke-width="1"/></svg>`,
    `<svg width="40" height="40" viewBox="0 0 40 40"><line x1="0" y1="20" x2="40" y2="20" stroke="currentColor" stroke-width="1"/><line x1="20" y1="0" x2="20" y2="40" stroke="currentColor" stroke-width="1"/></svg>`,
    `<svg width="35" height="35" viewBox="0 0 35 35"><polygon points="17.5,2 33,12 28,30 7,30 2,12" fill="none" stroke="currentColor" stroke-width="1"/></svg>`
  ];
  shapes.forEach(s=>{const d=document.createElement('div');d.innerHTML=s;d.firstChild.style.color='var(--ac)';d.style.left=Math.random()*90+5+'%';d.style.top=Math.random()*90+5+'%';d.style.animation=`fl ${5+Math.random()*6}s ease-in-out infinite ${-Math.random()*5}s`;d.style.transform=`rotate(${Math.random()*360}deg)`;c.appendChild(d)});
}

function initRV(){const obs=new IntersectionObserver(es=>{es.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');obs.unobserve(e.target)}})},{threshold:.06,rootMargin:'0px 0px -30px 0px'});document.querySelectorAll('.rv').forEach(el=>obs.observe(el))}
function initNav(){const nav=document.getElementById('mnav'),secs=document.querySelectorAll('section[id]'),links=document.querySelectorAll('.nlinks a');window.addEventListener('scroll',()=>{nav.classList.toggle('sc',scrollY>50);let cur='';secs.forEach(s=>{if(scrollY>=s.offsetTop-200)cur=s.id});links.forEach(a=>a.classList.toggle('act',a.getAttribute('href')==='#'+cur))},{passive:true})}
function initTh(){if(localStorage.getItem('pt')==='light')document.body.classList.add('lm');updThI()}
function togTh(){document.body.classList.toggle('lm');localStorage.setItem('pt',document.body.classList.contains('lm')?'light':'dark');updThI()}
function updThI(){const b=document.getElementById('tbtn');if(b)b.innerHTML=document.body.classList.contains('lm')?'<i class="fas fa-moon"></i>':'<i class="fas fa-sun"></i>'}
function initMob(){const t=document.getElementById('mtog'),m=document.getElementById('mmenu');t.addEventListener('click',()=>{m.classList.toggle('open');t.innerHTML=m.classList.contains('open')?'<i class="fas fa-times"></i>':'<i class="fas fa-bars"></i>'});m.querySelectorAll('a').forEach(a=>a.addEventListener('click',()=>{m.classList.remove('open');t.innerHTML='<i class="fas fa-bars"></i>'}))}
function handleR(){if(location.hash==='#admin'){if(isAuth())openAdm();else opLg()}}
window.addEventListener('hashchange',handleR);
document.addEventListener('keydown',e=>{if(e.key==='Enter'&&document.getElementById('lgOv').classList.contains('open'))doLg();if(e.key==='Escape'){if(document.getElementById('modO').classList.contains('open'))clMod();if(document.getElementById('lgOv').classList.contains('open'))clLg()}});
document.getElementById('modO').addEventListener('click',e=>{if(e.target===document.getElementById('modO'))clMod()});
document.getElementById('lgOv').addEventListener('click',e=>{if(e.target===document.getElementById('lgOv'))clLg()});
document.getElementById('tbtn').addEventListener('click',togTh);

async function boot(){
  try{
    await initA();
    window._d=loadD();
    initTh();renderAll();initPart();initFloats();initRV();initNav();initMob();handleR();
  }catch(err){
    console.error('Portfolio boot error:',err);
    window._d=window._d||JSON.parse(JSON.stringify(DEF));
    try{renderAll()}catch(e){console.error('Render error:',e)}
  }finally{
    setTimeout(()=>document.getElementById('ldr')?.classList.add('out'),500);
  }
}
boot();
</script>
